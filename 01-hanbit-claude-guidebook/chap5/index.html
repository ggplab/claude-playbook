const MONTHS = ["2025-07", "2025-08", "2025-09", "2025-10", "2025-11", "2025-12", "2026-01", "2026-02", "2026-03", "2026-04", "2026-05"];

const guSel = document.getElementById('gu');
[...new Set(ROWS.map(r=>r[0]))].sort((a,b)=>a.localeCompare(b,'ko')).forEach(g=>{
  const o=document.createElement('option'); o.value=g; o.textContent=g; guSel.appendChild(o);
});
guSel.addEventListener('change', render);

const fmt = n => n.toLocaleString('ko-KR');
const eok = manwon => (manwon/10000).toFixed(2) + '억';

function render(){
  const gu = guSel.value;
  const rows = gu ? ROWS.filter(r=>r[0]===gu) : ROWS;
  const count = rows.reduce((s,r)=>s+r[3],0);
  const sumP = rows.reduce((s,r)=>s+r[4],0);
  const sumPP = rows.reduce((s,r)=>s+r[5],0);
  document.getElementById('s-count').textContent = fmt(count)+'건';
  document.getElementById('s-price').textContent = count? eok(sumP/count) : '-';
  document.getElementById('s-ppp').textContent = count? fmt(Math.round(sumPP/count))+'만원' : '-';

  const byM = Object.fromEntries(MONTHS.map(m=>[m,0]));
  rows.forEach(r=>{ byM[r[2]] += r[3]; });
  const max = Math.max(...Object.values(byM), 1);
  document.getElementById('chart').innerHTML = MONTHS.map(m=>
    `<div class="bar" style="height:${Math.round(byM[m]/max*100)}%"><span>${fmt(byM[m])}</span></div>`).join('');
  document.getElementById('xlabels').innerHTML = MONTHS.map(m=>`<div>${m.slice(2).replace('-','.')}</div>`).join('');

  const byDong = {};
  rows.forEach(r=>{
    const k = r[0]+'|'+r[1];
    (byDong[k] ||= [0,0])[0]+=r[3], byDong[k][1]+=r[5];
  });
  const rank = Object.entries(byDong)
    .map(([k,[c,spp]])=>({k, gu:k.split('|')[0], dong:k.split('|')[1], c, avg:Math.round(spp/c)}))
    .filter(d=>d.c>=5)
    .sort((a,b)=>b.avg-a.avg).slice(0,10);
  document.getElementById('rank').innerHTML = rank.map((d,i)=>
    `<tr><td>${i+1}</td><td>${d.gu}</td><td>${d.dong}</td><td class="num">${fmt(d.avg)}만원</td><td class="num">${fmt(d.c)}건</td></tr>`).join('');
}
render();
</script>
